baseURL = "https://raisgeo.pages.dev/"
languageCode = "id"
title = "Raisgeo — Geographer Journal"
theme = "PaperMod"
paginate = 10

[params]
  author = "Rais"
  description = "Pemikiran, refleksi, dan catatan perjalanan dari Kalimantan"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = false

[params.homeInfoParams]
  Title = "Selamat Datang di Raisgeo"
  Content = "Jurnal pemikiran dan refleksi diri — dari bangku kuliah hingga tepian Kalimantan"

[[params.socialIcons]]
  name = "wordpress"
  url = "https://raisgeo.wordpress.com"

[menu]
  [[menu.main]]
    name = "Arsip"
    url = "/archives/"
    weight = 5
  [[menu.main]]
    name = "Tentang"
    url = "/about/"
    weight = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]  
[markup]  
  [markup.goldmark]  
    [markup.goldmark.renderer]  
      unsafe = true 
